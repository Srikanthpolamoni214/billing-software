<!DOCTYPE html>
<html>
<head>
<title>Billing Software</title>

<style>

body{
font-family:Arial;
background:#eef2f7;
padding:20px;
}

.container{
background:white;
padding:20px;
border-radius:12px;
max-width:900px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
}

input,select{
padding:10px;
margin:5px;
width:200px;
}

button{
padding:10px 15px;
cursor:pointer;
background:#007bff;
color:white;
border:none;
border-radius:5px;
}

button:hover{
background:#0056b3;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

th{
background:#f4f4f4;
}

.total{
font-size:22px;
font-weight:bold;
text-align:right;
margin-top:20px;
color:green;
}

</style>
</head>

<body>

<div class="container">
<a href="./admin">Admin</a>
<h2> Invoice Generator</h2>

<input list="itemsList" id="itemInput" placeholder="Search Item">
<datalist id="itemsList"></datalist>

<input type="number" id="qty" value="1" min="1">

<button onclick="addItem()">Add Item</button>

<table>

<thead>
<tr>
<th>Item</th>
<th>Price</th>
<th>Qty</th>
<th>Total</th>
<th>Remove</th>
</tr>
</thead>

<tbody id="billBody"></tbody>

</table>

<div class="total">
Grand Total: ₹ <span id="grandTotal">0</span>
</div>

</div>

<script>

let items=[]
let cart=[]

// LOAD ITEMS FROM BACKEND
async function loadItems(){

const res = await fetch("https://billing-server-vmld.onrender.com/api/items")
items = await res.json()

const list=document.getElementById("itemsList")

items.forEach(i=>{
let option=document.createElement("option")
option.value=i.name
list.appendChild(option)
})

}

loadItems()


function addItem(){

const name=document.getElementById("itemInput").value
const qty=parseInt(document.getElementById("qty").value)

const item=items.find(i=>i.name===name)

if(!item){
alert("Item not found")
return
}

const total=item.price*qty

cart.push({
name:item.name,
price:item.price,
qty,
total
})

render()

}


function render(){

const body=document.getElementById("billBody")
body.innerHTML=""

let grand=0

cart.forEach((c,i)=>{

grand+=c.total

body.innerHTML+=`
<tr>
<td>${c.name}</td>
<td>₹${c.price}</td>
<td>${c.qty}</td>
<td>₹${c.total}</td>
<td><button onclick="removeItem(${i})">X</button></td>
</tr>
`

})

document.getElementById("grandTotal").innerText=grand

}


function removeItem(i){
cart.splice(i,1)
render()
}

</script>

</body>
</html>
