<!DOCTYPE html>
<html>
<head>
<title>Admin - Add Items</title>

<style>
body{font-family:Arial;background:#f4f4f4;padding:20px}
.container{background:white;padding:20px;border-radius:10px;max-width:600px;margin:auto}
input{padding:8px;margin:5px}
button{padding:8px 15px}
table{width:100%;margin-top:20px;border-collapse:collapse}
th,td{border:1px solid #ddd;padding:10px;text-align:center}
</style>

</head>

<body>

<div class="container">

<h2>Admin Panel</h2>

<input id="name" placeholder="Item Name">
<input id="price" placeholder="Price" type="number">

<button onclick="addItem()">Add Item</button>

<table>

<thead>
<tr>
<th>Item</th>
<th>Price</th>
</tr>
</thead>

<tbody id="items"></tbody>

</table>

</div>

<script>

async function loadItems(){

const res = await fetch("https://billing-server-2386.onrender.com/api/items")
const data = await res.json()

const table = document.getElementById("items")
table.innerHTML=""

data.forEach(i=>{

table.innerHTML+=`
<tr>
<td>${i.name}</td>
<td>₹${i.price}</td>
</tr>
`

})

}

loadItems()

async function addItem(){

const name=document.getElementById("name").value
const price=document.getElementById("price").value

await fetch("https://billing-server-2386.onrender.com/api/items",{

method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({name,price})

})

loadItems()

}

</script>

</body>
</html>
